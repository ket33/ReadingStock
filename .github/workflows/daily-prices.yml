# 매일 저녁 당일 종가 + 스크리너 스냅샷 갱신
#   1) update_prices_daily.py   — 종가 upsert (수정주가 재조정 감지 시 전체 재적재)
#   2) update_screener_daily.py — 골라보기 표(현재가 환산 밸류에이션·수익률) 갱신
# 크론 시각(UTC)은 '의도'일 뿐 — GitHub Actions 예약은 정시에 1~2시간씩 밀린다(공식 미보장).
# 그래서 장 마감(15:30) 직후 07:00부터 3회로 촘촘히 걸어, 지연돼도 저녁 전에 반영되게 한다.
#   UTC 07:00 = KST 16:00 (마감 직후) · 09:00 = KST 18:00 · 11:00 = KST 20:00
#   전부 upsert라 중복 무해, 휴장일은 7일 창으로 자동 보정.
# ※ metrics(TTM 지표) 자체는 분기 공시가 떠야 바뀜 → 루트 파이프라인(run_all.py) 소관
name: daily-prices

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # 수동 실행 버튼 (테스트용)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install finance-datareader supabase

      - name: Update prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_prices_daily.py

      # 주가가 실패해도 스냅샷은 어제 주가 기준으로라도 갱신되도록 always()
      - name: Update screener snapshot
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_screener_daily.py

      # 시장지표(코스피·코스닥·S&P500·나스닥) — 워치리스트 성과 비교선용
      - name: Update market indices
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_indices_daily.py
