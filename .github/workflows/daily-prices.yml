# 매일 아침 전일 종가 갱신 — scripts/update_prices_daily.py 실행
# KST 평일 오전 8시 = UTC 일~목 23:00 (장 마감 다음날 아침, 휴장일은 7일 창으로 자동 보정)
name: daily-prices

on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch: {}   # 수동 실행 버튼 (테스트용)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install finance-datareader supabase

      - name: Update prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/update_prices_daily.py
